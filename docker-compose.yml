version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agileico-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - agileico-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/mail"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agileico-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - agileico-net

networks:
  agileico-net:
    driver: bridge
