version: "3.9"

services:

  # ── Backend (Node.js / Express) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attractify-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env           # PORT, ADMIN_EMAIL, ADMIN_PASS, ALLOWED_ORIGIN
    ports:
      - "5000:5000"
    networks:
      - attractify-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/mail"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (React / Vite → nginx) ───────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attractify-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - attractify-net

networks:
  attractify-net:
    driver: bridge
